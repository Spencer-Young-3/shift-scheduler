{{define "title"}}Approval{{end}}

{{define "main"}}
    <h2>Approval</h2>
    <form class="approval-form" id="approval-form" hx-post="/approval/{{$.Schedule.Id}}" hx-target="#scheduler-wrapper">
        <button class="approval-btn" onclick="ApproveSchedule()">Approve</button>
        <button class="rejection-btn" onclick="RejectSchedule()">Reject</button>
        <input id="status" type="hidden" value="" name="status"></input>
        <textarea id="msg" name="msg"></textarea>
    </form>
    <div style="padding: .5rem" id="scheduler-wrapper">
        {{template "week_view" .}}
    </div>

<script src="/static/week_view.js"></script>
<script>
const status = document.getElementById("status")
const myForm = document.getElementById("approval-form")

function ApproveSchedule() {
    status.value = "Approved"
    myForm.requestSubmit()
}

function RejectSchedule() {
    status.value = "Rejected"
    myForm.requestSubmit()
}

window.addEventListener("load", () => {
    console.log("binding HTMX listener")
    calculateTotals()

    document.body.addEventListener("htmx:afterSwap", (e) => {
        console.log("in swap", e.target)
        calculateTotals()

        if (e.target && e.target.id === "scheduler-wrapper") {
            console.log("ran function")
        }
    })
})

</script>

{{end}}
