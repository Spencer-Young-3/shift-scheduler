{{define "title"}}Schedule{{end}}

{{define "main"}}
    <h2>Schedule</h2>
    <form class="schedule-form" id="schedule-form" hx-post="/schedule" hx-disabled-elt="#scheduler button" hx-target="#scheduler-wrapper" hx-swap="innerHTML" onload="calculateTotals()">
        <div id="scheduler-wrapper">
            {{template "schedule_form" .}}
        </div>
    </form>

<script src="/static/week_view.js"></script>
<script>
let scheduler = document.querySelector("#scheduler")
let hidden = document.querySelector("#slots")
let myForm = document.getElementById('schedule-form')
let selected = new Set()

let bound = false
let dragging = false
let mode = "add"
let touched = new Set()

function syncHiddenInput() {
    hidden.value = JSON.stringify([...selected])
}

function submitForm() {
    updateSelected()
    myForm.requestSubmit()
}

function updateSelected() {
    let selected_elems = document.getElementsByClassName("selected")
    Array.from(selected_elems).forEach(element => {
        selected.add(element.dataset.slot)
    });
    console.log(selected)
    syncHiddenInput()
}

function setSelected(el, active) {
    el.classList.toggle("selected", active)
}

function processSlot(el) {
    const slot = el.dataset.slot

    if (!el.disabled) {
        
        if (mode === "add") {
            setSelected(el, true)
        } else {
            setSelected(el, false)
        }
    }

    calculateTotals()

}

function handlePointerDown(e) {
    const slot = e.target.closest(".slot")
    if (!slot) return

    dragging = true
    touched.clear()

    console.log(e.target.className)

    if (selected.has(slot.dataset.slot) || e.target.className.includes('selected')){
        mode = "remove"
    } else {
        mode = "add"
    }

    processSlot(slot)
}

function handlePointerOver(e) {
    if (!dragging) return

    const slot = e.target.closest(".slot")
    if (!slot) return

    processSlot(slot)
}

function handlePointerUp() {
    dragging = false
}

function onLoadFunctionality() {
    if (bound) {
        scheduler.removeEventListener("pointerdown", handlePointerDown)
        scheduler.removeEventListener("pointerover", handlePointerOver)
        window.removeEventListener("pointerup", handlePointerUp)
    }

    scheduler = document.querySelector("#scheduler")
    hidden = document.querySelector("#slots")
    myForm = document.getElementById('schedule-form')

    if (!scheduler || !hidden || !myForm) {
        console.log("in reload, not valid elements")
        console.log(scheduler, hidden, myForm)
    }

    selected = new Set()

    dragging = false
    mode = "add"
    touched = new Set()

    scheduler.addEventListener("dragstart", e => {
        e.preventDefault()
    })

    scheduler.addEventListener("pointerdown", handlePointerDown)
    scheduler.addEventListener("pointerover", handlePointerOver)
    window.addEventListener("pointerup", handlePointerUp)

    bound = true

    calculateTotals()
}

onLoadFunctionality()

document.addEventListener("DOMContentLoaded", (e) => {
    console.log("in swap")
    if (e.target.id === "scheduler-wrapper") {
        onLoadFunctionality()
        console.log("ran function")
    }
})

window.addEventListener("load", () => {
    console.log("binding HTMX listener")

    document.body.addEventListener("htmx:afterSwap", (e) => {
        console.log("in swap", e.target)

        if (e.target && e.target.id === "scheduler-wrapper") {
            onLoadFunctionality()
            console.log("ran function")
        }
    })
})

window.addEventListener("load", (event) => {
    calculateTotals()
})

</script>
{{end}}
